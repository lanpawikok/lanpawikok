name: Generate Snake

on:
  # Berjalan otomatis setiap 24 jam
  schedule:
    - cron: "0 0 * * *"
  
  # Mengizinkan kamu menjalankan workflow ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali ada push di branch main/master
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Membuat animasi snake berdasarkan kontribusi GitHub kamu
      - name: generate github-contribution-grid-snake.svg
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Melakukan push hasil animasi (.svg) ke branch bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
